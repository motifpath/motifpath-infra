name: Validate Infrastructure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'

      - name: Check formatting
        run: terraform fmt -check -recursive
        # Fix locally with: terraform fmt -recursive

  validate-staging:
    name: Validate Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'

      - name: Terraform init (no backend)
        working-directory: environments/staging
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: environments/staging
        run: terraform validate

  validate-production:
    name: Validate Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'

      - name: Terraform init (no backend)
        working-directory: environments/production
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: environments/production
        run: terraform validate

  plan-staging:
    name: Plan Staging (on PR)
    runs-on: ubuntu-latest
    needs: [format, validate-staging]
    if: github.event_name == 'pull_request'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init
        working-directory: environments/staging
        run: terraform init

      - name: Terraform plan
        working-directory: environments/staging
        run: terraform plan -out=staging.tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: staging-plan
          path: environments/staging/staging.tfplan
          retention-days: 3

  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [format, validate-staging, validate-production]
    steps:
      - run: echo "All infrastructure validations passed"
